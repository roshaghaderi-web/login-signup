<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
           
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at top left, #7c3aed 0%, transparent 35%),
                radial-gradient(circle at bottom right, #ec4899 0%, transparent 30%),
                linear-gradient(135deg, #0f172a, #111827, #1e293b);
            overflow: hidden;
        }

        .box {
            z-index: 1111;

            width: 380px;
            padding: 30px;
            border-radius: 28px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, .15);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, .55),
                inset 0 1px 1px rgba(255, 255, 255, .15);
            animation: show .7s ease;
        }



        .box input {
            width: 100%;
            height: 45px;
            margin: 12px 0;
            padding-left: 48px;
            border: none;
            outline: none;
            border-radius: 18px;
            background: #20202b;
            color: #fff;
            font-size: 15px;
            transition: .35s;
        }

        .box input::placeholder {
            color: #bfbfbf;
        }

        .box input:focus {
            background: #2d2d3d;
            box-shadow: 0 0 0 2px #d4af37;
            transform: translateY(-2px);
        }

      .box button {
    width: 100%;
    height: 52px;
    margin-top: 18px;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;

    background: linear-gradient(
        135deg,
        #7c3aed,
        #9333ea,
        #c026d3,
        #ec4899,
        #f472b6,
        #ec4899,
        #9333ea,
        #7c3aed
    );

    background-size: 300% 300%;

    animation: gradientMove 6s ease infinite;

    box-shadow: 0 15px 35px rgba(124,58,237,.4);

    transition: .35s;
}

        .box button:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 45px rgba(212, 175, 55, .6);
        }

        .box button:active {
            transform: scale(.98);
        }

        @keyframes show {
            from {
                opacity: 0;
                transform: translateY(50px) scale(.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .developer-card {

            position: fixed;

            left: 35px;
            bottom: 35px;

            width: 420px;
            height: 145px;

            display: flex;
            align-items: center;

            padding: 25px;

            border-radius: 35px;

            background: rgba(255, 255, 255, .08);

            backdrop-filter: blur(25px);

            border: 1px solid rgba(255, 255, 255, .15);

            box-shadow:
                0 25px 60px rgba(0, 0, 0, .45),
                inset 0 1px 1px rgba(255, 255, 255, .15);

            overflow: hidden;

            transition: .45s;
        }

        .developer-card:hover {

            transform: translateY(-8px);

            box-shadow:
                0 35px 80px rgba(124, 58, 237, .35);

        }

        .developer-card::before {

            content: "";

            position: absolute;

            width: 260px;
            height: 260px;

            left: -130px;
            top: -130px;

            background:
                radial-gradient(circle,
                    rgba(124, 58, 237, .35),
                    transparent 70%);

        }

        .avatar {
            width: 120px;
            height: 120px;

            border-radius: 50%;
            overflow: hidden;

            padding: 2px;
            /* فقط ۲ پیکسل */

            background: linear-gradient(135deg,
                    #ffffff90,
                    #d4af37,
                    #ffffff70);

            box-shadow:
                0 8px 30px rgba(0, 0, 0, .35);

            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .dev-info {

            z-index: 5;

        }

        .dev-info h2 {

            color: #fff;

            font-size: 31px;

            margin-bottom: 6px;

            font-weight: 700;

        }

        .dev-info p {

            color: #cfcfcf;

            font-size: 15px;

            margin-bottom: 20px;

        }

        .links {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .links a {

            width: 46px;
            height: 46px;

            display: flex;
            justify-content: center;
            align-items: center;

            border-radius: 14px;

            text-decoration: none;

            color: #e8e8e8;

            background: rgba(255, 255, 255, .06);

            border: 1px solid rgba(255, 255, 255, .12);

            transition: .35s;
        }

        .links a i {
            font-size: 21px;
        }

        .links a:hover {

            transform: translateY(-6px);

            background: #ffffff;

            color: #111;

            box-shadow:
                0 12px 30px rgba(255, 255, 255, .18);

        }

        header {
            width: 100%;
            padding: 20px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i{
    font-size: 32px;
    color: #8b5cf6;
    margin-right: 10px;
}

        .logo h2 {
            color: white;
            font-size: 26px;
        }

        header a {
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border: 1px solid #8b5cf6;
            border-radius: 14px;
            transition: .3s;
        }

        header a:hover {
            background: #8b5cf6;
        }

        .form-icon {
            width: 70px;
            height: 70px;
            margin: auto;
            margin-bottom: 12px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            box-shadow: 0 0 30px rgba(139, 92, 246, .5);
        }

        .form-icon i {
            font-size: 34px;
            color: white;
        }

        .box h1 {
            text-align: center;
            color: white;
            font-size: 34px;
            margin-bottom: 4px;
        }

        .box p {
            text-align: center;
            margin-bottom: 18px;
            font-size: 15px;
        }

        .input-box {
            position: relative;
            margin-bottom: 10px;
        }

        .input-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 18px;
        }

        .logo span {
            color: #8b5cf6;
        }
     @keyframes gradientMove {

    0% {
        background-position: 0% 50%;
    }

    50% {
        background-position: 100% 50%;
    }

    100% {
        background-position: 0% 50%;
    }

}
    </style>
