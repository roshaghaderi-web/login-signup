<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 50px;
            background:
                radial-gradient(circle at top left, #6b21a8 0%, transparent 35%),
                radial-gradient(circle at bottom right, #f59e0b 0%, transparent 30%),
                linear-gradient(135deg, #09090b, #18181b, #0f172a);
            overflow-x: hidden;
        }

        /* ================= LOGIN ================= */

        .box {
            width: 420px;
            padding: 40px;
            border-radius: 30px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, .15);
            box-shadow:
                0 35px 80px rgba(0, 0, 0, .6),
                inset 0 1px 1px rgba(255, 255, 255, .15);
        }

        .box input[type=email],
        .box input[type=password] {
            width: 100%;
            height: 58px;
            margin: 14px 0;
            border: none;
            outline: none;
            border-radius: 18px;
            padding: 0 22px;
            background: #20202b;
            color: white;
            font-size: 16px;
            transition: .35s;
        }

        .box input::placeholder {
            color: #bdbdbd;
        }

        .box input:focus {
            background: #2e2e3f;
            box-shadow: 0 0 0 2px #d4af37;
            transform: translateY(-2px);
        }

        .box input[type=checkbox] {
            accent-color: #d4af37;
            width: 18px;
            height: 18px;
            margin-top: 15px;
        }

        .box label {
            color: #f3f3f3;
            margin-left: 8px;
        }

        .box button {
            width: 100%;
            height: 58px;
            margin-top: 28px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #111;
            background: linear-gradient(135deg, #f5d365, #d4af37, #f5d365);
            transition: .35s;
            box-shadow: 0 15px 35px rgba(212, 175, 55, .45);
        }

        .box button:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(212, 175, 55, .6);
        }

        /* ================= TABLE ================= */

        table {
            margin-top: 55px;
            width: 95%;
            max-width: 1200px;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 25px;
            background: rgba(17, 17, 17, .88);
            border: 1px solid rgba(212, 175, 55, .35);
            box-shadow:
                0 40px 90px rgba(0, 0, 0, .65),
                0 0 0 1px rgba(255, 255, 255, .05);
            animation: tableShow .8s ease;
        }

        table td {
            padding: 24px;
            color: #f5f5f5;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            transition: .35s;
        }

        table tr:hover td {
            background: #27272f;
        }

        table td:nth-child(1) {
            color: #f5d365;
            font-weight: bold;
            font-size: 22px;
        }

        table td:nth-child(2) {
            font-weight: 700;
            font-size: 18px;
        }

        table td img {
            width: 170px;
            height: 170px;
            object-fit: cover;
            border-radius: 20px;
            border: 4px solid #d4af37;
            transition: .4s;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .45);
        }

        table td img:hover {
            transform: scale(1.1);
            border-color: white;
        }

        @keyframes tableShow {
            from {
                opacity: 0;
                transform: translateY(60px) scale(.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }



        .box {
            width: 420px;
            padding: 40px;
            border-radius: 30px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, .15);
            box-shadow:
                0 35px 80px rgba(0, 0, 0, .6),
                inset 0 1px 1px rgba(255, 255, 255, .15);

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .box input[type=email],
        .box input[type=password] {
            width: 100%;
        }

        .box button {
            width: 100%;
             background:linear-gradient(
        115deg,
        #6d28d9 0%,
        #7c3aed 18%,
        #8b5cf6 38%,
        #a78bfa 58%,
        #d8b25c 82%,
        #e2b84b 100%
    );

border:1px solid rgba(255,255,255,.08);
            transition: .4s;

background-size:250% 250%;
animation:gradientMove 6s ease infinite;
        }

        .box label {
            width: 100%;
            margin-top: 8px;
            color: #fff;
        }

        /* remember me */

        .box input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #d4af37;
            margin: 0;
            align-self: flex-start;
            transform: translateY(35px);
        }

        .box label {
            width: auto;
            color: #fff;
            margin-left: 28px;
            margin-top: 8px;
            align-self: flex-start;

        }

        /* welcome */

        /* welcome */

        h2:first-of-type {
            width: 100%;
            text-align: center;
            margin: 30px 0 10px;
            padding: 0;
            background: none;
            box-shadow: none;
            border: none;
            color: #ffffff;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: capitalize;
            text-shadow:
                0 0 15px rgba(255, 255, 255, .25),
                0 0 30px rgba(139, 92, 246, .45);
        }

        /* logout */



        strong {
            display: block;
            width: 150px;
            margin: 20px 20px 10px auto;
            padding: 12px 18px;
            text-align: center;
            color: #fff;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(255, 65, 108, .35);

            position: relative;
            left: 800px;
            /* مقدارش رو کم و زیاد کن */
        }

        strong:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 35px rgba(255, 65, 108, .5);
        }

        .pop {
            width: 450px;
            padding: 35px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, .55);
            display: none;
            z-index: 999;
        }

        .pop input {
            display: block;
            width: 100%;
            height: 55px;
            margin: 18px auto;
            padding: 0 18px;
            border: none;
            outline: none;
            border-radius: 15px;
            background: #20202b;
            color: #fff;
            font-size: 16px;
            transition: .3s;
        }

        .pop input:focus {
            background: #fff;
            color: #222;
            box-shadow: 0 0 18px rgba(255, 255, 255, .35);
        }

        .pop button {
            display: block;
            width: 100%;
            height: 55px;
            margin-top: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 700;
            color: #111;
            background: linear-gradient(135deg, #f5d365, #d4af37);
            transition: .3s;
        }

        .pop button:hover {
            transform: translateY(-3px);
        }

        .pop::before {
            content: " Edit User";
            display: block;
            text-align: center;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* ---------- Header ---------- */

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;

        .logo i {

        }

        .logo h2 {

        .logo span {

        }

        header a {

        }

        /* ---------- Login Title ---------- */

        .form-icon{

<body>
    <header>

    <div class="box">
        <div class="form-icon">
            <i class="bi bi-box-arrow-in-right"></i>
        </div>

        <h1>Welcome Back</h1>

        <p>Sign in to continue</p>
        <input type="email" placeholder="email or phone">
        <input type="password" placeholder="password">
        <input id="a" type="checkbox" placeholder="password">
        <label for="a">remember me</label>
        <button>login</button>
    </div>

<script src="js.cookie.min.js"></script>
<script>
    const myToken = 'https://6a367d60766b831960f94906.mockapi.io/users'
    const a = document.getElementById('a')
    const inp = document.querySelectorAll('.box>input')
    const btn = document.querySelector('.box>button')
    const box = document.querySelector('.box')
    const editInp = document.querySelectorAll('.pop>input')
    const pop = document.querySelector('.pop')






    let emailcookie = Cookies.get('email')
    let passcookie = Cookies.get('pass')

    if (emailcookie != undefined && passcookie != undefined) {
        const person = {
            email: emailcookie,
            pass: passcookie
        }
        getuser(person)
    }




    btn.addEventListener('click', () => {
        const person = {
            email: inp[0].value,
            pass: inp[1].value
        }
        getuser(person)
    })
    function getuser(person) {

        const url = new URL(myToken);

        console.log(person.email.search(/[a-z]/));

        if (person.email.search(/[a-z]/) == -1) {
            url.searchParams.append('phone', person.email);
        } else {
            url.searchParams.append('email', person.email);

        }
        url.searchParams.append('pass', person.pass);


        fetch(url, {
            method: 'GET',
            headers: { 'content-type': 'application/json' },
        }).then(res => {
            if (res.ok) {
                return res.json();
            }
            // handle error
        }).then(tasks => {
            console.log(tasks);

            if (a.checked) {
                console.log(tasks);
                box.style.display = 'none'
                Cookies.set('email', person.email, { expires: 7 })
                Cookies.set('pass', person.pass, { expires: 7 })
            }
            box.style.display = 'none'
            // display tabe/////
            let tbl = document.createElement('table')
            tbl.innerHTML = `
            <h2>welcome ${tasks[0].fullname}</h2>
            <tr width='100%' border='2px '>
                <td>${tasks[0].id}</td>
                <td>${tasks[0].fullname}</td>
                <td>${tasks[0].pass}</td>
                <td>${tasks[0].email}</td>
                <td>${tasks[0].phone}</td>
                <td><img width=200 src='${tasks[0].avatar}'></td>
                <td onclick='showuserdata(${tasks[0].id})'>edit</td>
                <td onclick='mydel(${tasks[0].id})'>delete</td>
                </tr>
                <strong  onclick='logout()'>logout</strong>
            `
            document.body.appendChild(tbl)
            // display tabe/////
        }).catch(error => {
        })
    }
    function logout() {
        Cookies.remove('email')
        Cookies.remove('pass')
        location.reload()
    }
    function mydel(i) {
        if (confirm('sure?')) {

            fetch(myToken + '/' + i, {
                method: 'DELETE',
            }).then(res => {
                if (res.ok) {
                    return res.json();
                }
            }).then(task => {
                alert('you deleted! go out from my page!')
                logout()
            }).catch(error => {
            })
        }
    }

    async function showuserdata(i) {
        pop.style.display = 'block'
        let temp = await getdata(myToken + '/' + i)
        console.log(temp);
        editInp[0].value = temp.email
        editInp[1].value = temp.phone
        editInp[2].value = temp.fullname
        editInp[3].value = temp.pass
        editInp[4].value = temp.id

    }
    async function getdata(url) {
        let x = await fetch(url)
        let data = await x.json()
        return data
    }
    function userconfirm() {
        const editusernew = {
            email: editInp[0].value,
            phone: editInp[1].value,
            fullname: editInp[2].value,
            pass: editInp[3].value,
            id: editInp[4].value
        }

        fetch(myToken + '/' + editusernew.id, {
            method: 'PUT', // or PATCH
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(editusernew)
        }).then(res => {
            if (res.ok) {
                return res.json();
            }
        }).then(tasks => {
            console.log(tasks);
            alert('user edited!')
            pop.style.display = 'none'
            logout()
        }).catch(error => {
        })
    }
</script>
